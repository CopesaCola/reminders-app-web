services:
  postgres:
    image: postgres:16-alpine
    container_name: reminders-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reminders}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-reminders}
    volumes:
      # On Unraid, mount appdata here. Override via .env if you want a different path.
      - ${APPDATA_DIR:-/mnt/user/appdata/reminders}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-reminders} -d ${POSTGRES_DB:-reminders}']
      interval: 10s
      timeout: 5s
      retries: 5
    # No port published by default — only the app needs to reach it on the internal network.
    networks:
      - reminders

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: reminders-app:local
    container_name: reminders-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-reminders}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reminders}
      APP_PASSWORD: ${APP_PASSWORD:?set APP_PASSWORD in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:?set VAPID_PUBLIC_KEY in .env}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:?set VAPID_PRIVATE_KEY in .env}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:you@example.com}
      CRON_SECRET: ${CRON_SECRET:?set CRON_SECRET in .env}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/New_York}
    ports:
      # Bind to localhost only — cloudflared (or your reverse proxy) talks to it over the internal network.
      # Change to "3152:3152" if you want LAN access.
      - '127.0.0.1:3152:3152'
    labels:
      # Ofelia reads these labels via the Docker socket to schedule jobs.
      # The `fire-cron` helper lives in the image and reads CRON_SECRET from the container env.
      # Schedules use 6-field cron (with seconds): `s m h dom mon dow`.
      ofelia.enabled: 'true'
      ofelia.job-exec.reminders.schedule: '@every 15m'
      ofelia.job-exec.reminders.command: 'fire-cron reminders'
      ofelia.job-exec.weekly-digest.schedule: '0 0 18 * * 0'
      ofelia.job-exec.weekly-digest.command: 'fire-cron weekly-digest'
    networks:
      - reminders

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: reminders-cron
    restart: unless-stopped
    depends_on:
      - app
    command: daemon --docker
    environment:
      # Match the app's timezone so `0 0 18 * * 0` means 18:00 in your local time.
      TZ: ${APP_TIMEZONE:-America/New_York}
    volumes:
      # Read-only Docker socket — Ofelia uses it to read labels and exec into the app container.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - reminders

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: reminders-tunnel
    restart: unless-stopped
    # Run a named tunnel using the token from Cloudflare Zero Trust dashboard.
    # See README "Cloudflare Tunnel setup" for how to get the token.
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - reminders

networks:
  reminders:
    name: reminders
